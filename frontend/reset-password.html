<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Dants Arena</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="img/jpeg" href="favicon.jpeg"/>
  <style>
    .simple-auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      background:
        radial-gradient(circle at top left, rgba(0, 230, 118, 0.08), transparent 38%),
        linear-gradient(180deg, #060a07 0%, #0a120d 100%);
    }
    .simple-auth-card {
      width: 100%;
      max-width: 440px;
      padding: 28px;
      border-radius: 18px;
      background: rgba(8, 12, 9, 0.94);
      border: 1px solid rgba(0, 230, 118, 0.12);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }
    .simple-auth-card h1 {
      font-family: 'Anton', sans-serif;
      font-size: 2.4rem;
      line-height: 1;
      margin-bottom: 8px;
    }
    .simple-auth-card h1 span { color: #00E676; }
    .simple-auth-card p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .simple-auth-footer {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="simple-auth-page">
    <form class="simple-auth-card" id="reset-password-form">
      <a href="index.html" class="logo" style="text-decoration:none;margin-bottom:24px;">
        <div class="logo-icon">⚽</div>
        <div>
          <div class="logo-text">DANTS<span>.</span></div>
          <div class="logo-sub">Arena · Abeokuta</div>
        </div>
      </a>

      <h1>Reset <span>Password</span></h1>
      <p id="reset-password-copy">Choose a new password for your Dants Arena account.</p>

      <div class="form-group">
        <label>New Password</label>
        <input id="reset-password-new" type="password" placeholder="At least 6 characters" required/>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input id="reset-password-confirm" type="password" placeholder="Repeat your password" required/>
      </div>

      <button type="submit" class="btn btn-green" style="width:100%;padding:14px;margin-top:8px;">Reset Password →</button>
      <p class="simple-auth-footer"><a href="login.html">Back to login</a></p>
    </form>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get('token') || '';
    if (!resetToken) {
      document.getElementById('reset-password-copy').textContent = 'This reset link is missing a token. Request a new reset email.';
    }

    document.getElementById('reset-password-form')?.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!resetToken) {
        showToast('This reset link is invalid. Request a new one.');
        return;
      }

      const newPassword = document.getElementById('reset-password-new')?.value || '';
      const confirmPassword = document.getElementById('reset-password-confirm')?.value || '';
      const button = event.target.querySelector('button[type="submit"]');

      if (newPassword.length < 6) {
        showToast('Password must be at least 6 characters.');
        return;
      }
      if (newPassword !== confirmPassword) {
        showToast('Passwords do not match.');
        return;
      }

      button.disabled = true;
      button.textContent = 'Resetting...';
      const result = await resetPasswordWithToken(resetToken, newPassword);
      button.disabled = false;
      button.textContent = 'Reset Password →';

      if (result && result.success) {
        showToast(result.message || 'Password reset successful.');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1200);
      }
    });
  </script>
</body>
</html>
