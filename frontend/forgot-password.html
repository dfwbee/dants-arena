<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Dants Arena</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .simple-auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      background:
        radial-gradient(circle at top left, rgba(0, 230, 118, 0.08), transparent 38%),
        linear-gradient(180deg, #060a07 0%, #0a120d 100%);
    }
    .simple-auth-card {
      width: 100%;
      max-width: 440px;
      padding: 28px;
      border-radius: 18px;
      background: rgba(8, 12, 9, 0.94);
      border: 1px solid rgba(0, 230, 118, 0.12);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }
    .simple-auth-card h1 {
      font-family: 'Anton', sans-serif;
      font-size: 2.4rem;
      line-height: 1;
      margin-bottom: 8px;
    }
    .simple-auth-card h1 span { color: #00E676; }
    .simple-auth-card p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .simple-auth-footer {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="simple-auth-page">
    <form class="simple-auth-card" id="forgot-password-form">
      <a href="login.html" class="logo" style="text-decoration:none;margin-bottom:24px;">
        <div class="logo-icon">⚽</div>
        <div>
          <div class="logo-text">DANTS<span>.</span></div>
          <div class="logo-sub">Arena · Abeokuta</div>
        </div>
      </a>

      <h1>Forgot <span>Password</span></h1>
      <p>Enter the email address connected to your account and we’ll send you a secure password reset link.</p>

      <div class="form-group">
        <label>Email Address</label>
        <input id="forgot-password-email" type="email" placeholder="you@email.com" required/>
      </div>

      <button type="submit" class="btn btn-green" style="width:100%;padding:14px;margin-top:8px;">Send Reset Link →</button>
      <p class="simple-auth-footer">Remembered your password? <a href="login.html">Back to login</a></p>
    </form>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
  <script>
    document.getElementById('forgot-password-form')?.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('forgot-password-email')?.value.trim();
      const button = event.target.querySelector('button[type="submit"]');
      if (!email) {
        showToast('Enter your email address first.');
        return;
      }

      button.disabled = true;
      button.textContent = 'Sending...';
      const result = await requestPasswordReset(email);
      button.disabled = false;
      button.textContent = 'Send Reset Link →';

      if (result && result.success) {
        showToast(result.message || 'Password reset email sent.');
      }
    });
  </script>
</body>
</html>
